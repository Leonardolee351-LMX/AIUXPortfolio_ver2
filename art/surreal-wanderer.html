      <p class="art-sub">空间叙事翻译实验。以《Sonny Boy》的超现实漂流体验为文本，将叙事线索与情绪波形抽象为可解析的结构，并映射到广州美术学院场地的多个平台空间上，探索“空间语言”如何承载故事的推进与符号的转译。</p>
